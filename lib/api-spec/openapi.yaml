openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kampulse Recruitment & Employee Onboarding Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: jobs
    description: Job listings
  - name: applications
    description: Applicant application flow
  - name: admin
    description: Admin operations
  - name: uploads
    description: File uploads

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: New auth tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Logout admin
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current admin user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset link sent (if email exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ADMIN JOB MANAGEMENT
  /admin/jobs:
    get:
      operationId: listAdminJobs
      tags: [admin]
      summary: List all jobs (any status)
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createAdminJob
      tags: [admin]
      summary: Create a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminJobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /admin/jobs/{id}:
    patch:
      operationId: updateAdminJob
      tags: [admin]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminJobInput"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # JOBS
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all active jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # APPLICATIONS (public token-based flow)
  /applications:
    post:
      operationId: startApplication
      tags: [applications]
      summary: Start a new application (Step 1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStart"
      responses:
        "201":
          description: Application created with resume token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/resume/{token}:
    get:
      operationId: resumeApplication
      tags: [applications]
      summary: Resume application by secure token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application data for resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResume"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{token}/personal:
    patch:
      operationId: savePersonalInfo
      tags: [applications]
      summary: Save personal information (Step 2)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalInfoInput"
      responses:
        "200":
          description: Personal info saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResume"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{token}/guarantor:
    patch:
      operationId: saveGuarantorInfo
      tags: [applications]
      summary: Save guarantor information (Step 4)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuarantorInfoInput"
      responses:
        "200":
          description: Guarantor info saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResume"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{token}/agreement:
    patch:
      operationId: saveAgreement
      tags: [applications]
      summary: Accept employment agreement (Step 5)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgreementInput"
      responses:
        "200":
          description: Agreement saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResume"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{token}/submit:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit the completed application (Step 6)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResume"
        "400":
          description: Incomplete application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ADMIN ENDPOINTS
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications:
    get:
      operationId: listAdminApplications
      tags: [admin]
      summary: List all applications (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, under_review, approved, rejected]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications/{id}:
    get:
      operationId: getAdminApplication
      tags: [admin]
      summary: Get full application details (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full application details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications/{id}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [admin]
      summary: Update application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications/{id}/notes:
    post:
      operationId: addApplicationNote
      tags: [admin]
      summary: Add internal note to application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminNoteInput"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNote"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications/{id}/pdf:
    get:
      operationId: generateApplicationPdf
      tags: [admin]
      summary: Generate PDF for application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    post:
      operationId: createAdminUser
      tags: [admin]
      summary: Create a new admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserInput"
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [admin]
      summary: Get recent application activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # AUTH SCHEMAS
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/AdminUser"

    AdminUser:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, admin, hr]

    AdminUserInput:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [super_admin, admin, hr]

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string

    AdminJobInput:
      type: object
      required: [title, location, salary, workingHours, status]
      properties:
        title:
          type: string
        location:
          type: string
        salary:
          type: string
        workingHours:
          type: string
        transportAllowance:
          type: string
        overtime:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, closed]

    # JOB SCHEMAS
    Job:
      type: object
      required: [id, title, location, salary, workingHours, status]
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        salary:
          type: string
        workingHours:
          type: string
        transportAllowance:
          type: ["string", "null"]
        overtime:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, closed]
        createdAt:
          type: string
          format: date-time

    # APPLICATION SCHEMAS
    ApplicationStart:
      type: object
      required: [jobId, expectedStartDate, applicationSource, coverLetter]
      properties:
        jobId:
          type: integer
        expectedStartDate:
          type: string
        applicationSource:
          type: string
        coverLetter:
          type: string

    ApplicationToken:
      type: object
      required: [id, token, resumeUrl]
      properties:
        id:
          type: integer
        token:
          type: string
        resumeUrl:
          type: string

    PersonalInfoInput:
      type: object
      required: [fullName, dateOfBirth, gender, nationality, stateOfOrigin, lga, maritalStatus, address, phone, email, nextOfKinName, nextOfKinRelationship, nextOfKinPhone, nextOfKinAddress, emergencyContactName, emergencyContactRelationship, emergencyContactPhone, emergencyContactAddress]
      properties:
        fullName:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        nationality:
          type: string
        stateOfOrigin:
          type: string
        lga:
          type: string
        maritalStatus:
          type: string
          enum: [single, married, divorced, widowed]
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        nextOfKinName:
          type: string
        nextOfKinRelationship:
          type: string
        nextOfKinPhone:
          type: string
        nextOfKinAddress:
          type: string
        emergencyContactName:
          type: string
        emergencyContactRelationship:
          type: string
        emergencyContactPhone:
          type: string
        emergencyContactAddress:
          type: string
        computerLiteracy:
          type: string
          enum: [proficient, basic, none]

    GuarantorInfoInput:
      type: object
      required: [guarantorFullName, guarantorAddress, guarantorOccupation, guarantorPlaceOfWork, guarantorPhone, guarantorEmail, guarantorRelationship, guarantorYearsKnown, guarantorIdType, guarantorIdNumber, guarantorIdIssueDate, guarantorIdExpiryDate, witnessName, witnessAddress, witnessPhone, declarationAccepted]
      properties:
        guarantorFullName:
          type: string
        guarantorAddress:
          type: string
        guarantorOccupation:
          type: string
        guarantorPlaceOfWork:
          type: string
        guarantorPhone:
          type: string
        guarantorEmail:
          type: string
        guarantorRelationship:
          type: string
        guarantorYearsKnown:
          type: integer
        guarantorIdType:
          type: string
        guarantorIdNumber:
          type: string
        guarantorIdIssueDate:
          type: string
        guarantorIdExpiryDate:
          type: string
        witnessName:
          type: string
        witnessAddress:
          type: string
        witnessPhone:
          type: string
        declarationAccepted:
          type: boolean

    AgreementInput:
      type: object
      required: [agreedToTerms, fullNameConfirmation, signatureData]
      properties:
        agreedToTerms:
          type: boolean
        fullNameConfirmation:
          type: string
        signatureData:
          type: string
          description: Base64 encoded signature image

    UploadResponse:
      type: object
      required: [fileType, filePath, fileName, fileUrl]
      properties:
        fileType:
          type: string
        filePath:
          type: string
        fileName:
          type: string
        fileUrl:
          type: string

    ApplicationResume:
      type: object
      required: [id, token, status, currentStep, jobId, jobTitle]
      properties:
        id:
          type: integer
        token:
          type: string
        status:
          type: string
          enum: [draft, pending, under_review, approved, rejected]
        currentStep:
          type: integer
        jobId:
          type: integer
        jobTitle:
          type: string
        applicationSource:
          type: ["string", "null"]
        expectedStartDate:
          type: ["string", "null"]
        coverLetter:
          type: ["string", "null"]
        personalInfo:
          $ref: "#/components/schemas/PersonalInfoData"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentData"
        guarantorInfo:
          $ref: "#/components/schemas/GuarantorInfoData"
        agreementAccepted:
          type: ["boolean", "null"]
        agreementSignedAt:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PersonalInfoData:
      type: object
      properties:
        fullName:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        stateOfOrigin:
          type: ["string", "null"]
        lga:
          type: ["string", "null"]
        maritalStatus:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        nextOfKinName:
          type: ["string", "null"]
        nextOfKinRelationship:
          type: ["string", "null"]
        nextOfKinPhone:
          type: ["string", "null"]
        nextOfKinAddress:
          type: ["string", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactRelationship:
          type: ["string", "null"]
        emergencyContactPhone:
          type: ["string", "null"]
        emergencyContactAddress:
          type: ["string", "null"]
        computerLiteracy:
          type: ["string", "null"]
          enum: [proficient, basic, none, null]

    GuarantorInfoData:
      type: object
      properties:
        guarantorFullName:
          type: ["string", "null"]
        guarantorAddress:
          type: ["string", "null"]
        guarantorOccupation:
          type: ["string", "null"]
        guarantorPlaceOfWork:
          type: ["string", "null"]
        guarantorPhone:
          type: ["string", "null"]
        guarantorEmail:
