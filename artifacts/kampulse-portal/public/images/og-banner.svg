<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial glow behind the icon -->
    <radialGradient id="glow" cx="50%" cy="34%" r="45%">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle bottom vignette -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1020" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative corner accent top-left -->
  <circle cx="0" cy="0" r="220" fill="#2196F3" opacity="0.04"/>
  <!-- Decorative corner accent bottom-right -->
  <circle cx="1200" cy="630" r="260" fill="#7C4DFF" opacity="0.05"/>

  <!-- Decorative horizontal rule across top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#topLine)"/>
  <defs>
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4FC3F7" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#7C4DFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Wing mark icon (scale 150/180 ≈ 0.833, centred at 600, 185) ── -->
  <g transform="translate(525, 110) scale(0.833)">
    <rect width="180" height="180" rx="36" fill="#0d1226"/>
    <!-- Top wing — bright blue -->
    <path d="M55 55 Q90 35 130 50 Q110 65 75 68 Z" fill="#4FC3F7" opacity="0.95"/>
    <!-- Middle wing — medium blue -->
    <path d="M50 75 Q88 55 128 68 Q108 82 70 86 Z" fill="#2196F3" opacity="0.85"/>
    <!-- Bottom wing — purple/indigo -->
    <path d="M58 95 Q90 78 122 90 Q104 102 72 105 Z" fill="#7C4DFF" opacity="0.75"/>
  </g>

  <!-- ── Wordmark ── -->
  <!-- KAMPULSE -->
  <text
    x="600" y="338"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="900"
    letter-spacing="10"
    fill="white"
    text-anchor="middle"
  >KAMPULSE</text>

  <!-- HANDLING SOLUTIONS LTD. -->
  <text
    x="600" y="382"
    font-family="Arial, Helvetica, sans-serif"
    font-size="24"
    font-weight="400"
    letter-spacing="6"
    fill="#64748b"
    text-anchor="middle"
  >HANDLING SOLUTIONS LTD.</text>

  <!-- Divider -->
  <line x1="500" y1="408" x2="700" y2="408" stroke="#2196F3" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="600" y="458"
    font-family="Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="300"
    fill="#4FC3F7"
    text-anchor="middle"
    font-style="italic"
  >Building Careers. Empowering Businesses.</text>

  <!-- Bottom vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Domain -->
  <text
    x="600" y="572"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20"
    font-weight="400"
    letter-spacing="2"
    fill="#334155"
    text-anchor="middle"
  >kampulse.com</text>
</svg>
