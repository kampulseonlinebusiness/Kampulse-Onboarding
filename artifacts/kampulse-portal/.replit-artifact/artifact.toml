kind = "web"
previewPath = "/"
title = "Kampulse Recruitment Portal"
version = "1.0.0"
id = "artifacts/kampulse-portal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21414

[services.development]
run = "pnpm --filter @workspace/kampulse-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kampulse-portal", "run", "build" ]
serve = "static"
publicDir = "artifacts/kampulse-portal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21414"
BASE_PATH = "/"
