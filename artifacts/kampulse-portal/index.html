<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary SEO -->
    <title>Kampulse Handling Solutions | Careers &amp; Job Vacancies in Nigeria</title>
    <meta name="description" content="Explore open positions at Kampulse Handling Solutions Ltd — Nigeria's trusted recruitment and workforce management partner. Apply for jobs in Delta State and across Nigeria today." />
    <meta name="keywords" content="Kampulse, recruitment Nigeria, jobs Delta State, cashier jobs Nigeria, betshop jobs, workforce management, Osubi, Kampulse Handling Solutions" />
    <meta name="author" content="Kampulse Handling Solutions Ltd" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://kampulse.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Kampulse Handling Solutions Ltd" />
    <meta property="og:title" content="Careers at Kampulse | Job Vacancies in Nigeria" />
    <meta property="og:description" content="Join Kampulse Handling Solutions — Nigeria's leading recruitment and workforce management company. Browse open roles and apply today." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kampulse.com/" />
    <meta property="og:image" content="https://kampulse.com/images/kampulse-logo.webp" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Careers at Kampulse | Job Vacancies in Nigeria" />
    <meta name="twitter:description" content="Join Kampulse Handling Solutions — Nigeria's leading recruitment and workforce management company. Browse open roles and apply today." />
    <meta name="twitter:image" content="https://kampulse.com/images/kampulse-logo.webp" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- DNS Prefetch & Preconnect for Google Fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter — single, consolidated font load with display=swap -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kampulse Handling Solutions Ltd",
      "url": "https://kampulse.com",
      "logo": "https://kampulse.com/images/kampulse-logo.webp",
      "description": "Nigeria's trusted recruitment, staffing, and workforce management partner.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "No. 9 Ricardo Oguma Close, Opposite Osubi Airport",
        "addressRegion": "Delta State",
        "addressCountry": "NG"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+2347040621103",
        "contactType": "customer service",
        "email": "info@kampulse.com"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD Structured Data: JobPosting page as a collection -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kampulse Recruitment Portal",
      "url": "https://kampulse.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kampulse.com/jobs?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
