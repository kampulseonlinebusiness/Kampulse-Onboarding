<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary SEO -->
    <title>Kampulse Handling Solutions | Careers &amp; Job Vacancies in Nigeria</title>
    <meta name="description" content="Explore open positions at Kampulse Handling Solutions Ltd — Nigeria's trusted recruitment and workforce management partner. Apply for jobs in Delta State and across Nigeria today." />
    <meta name="keywords" content="Kampulse, recruitment Nigeria, jobs Delta State, cashier jobs Nigeria, betshop jobs, workforce management, Osubi, Kampulse Handling Solutions" />
    <meta name="author" content="Kampulse Handling Solutions Ltd" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://kampulseai.com/" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kampulse" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicons & touch icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Kampulse Handling Solutions Ltd" />
    <meta property="og:title" content="Careers at Kampulse | Job Vacancies in Nigeria" />
    <meta property="og:description" content="Join Kampulse Handling Solutions — Nigeria's leading recruitment and workforce management company. Browse open roles and apply today." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kampulseai.com/" />
    <meta property="og:image" content="https://kampulseai.com/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Careers at Kampulse | Job Vacancies in Nigeria" />
    <meta name="twitter:description" content="Join Kampulse Handling Solutions — Nigeria's leading recruitment and workforce management company. Browse open roles and apply today." />
    <meta name="twitter:image" content="https://kampulseai.com/icons/icon-512.png" />

    <!-- DNS Prefetch & Preconnect for Google Fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter — single, consolidated font load with display=swap -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kampulse Handling Solutions Ltd",
      "url": "https://kampulseai.com",
      "logo": "https://kampulseai.com/icons/icon-512.png",
      "description": "Nigeria's trusted recruitment, staffing, and workforce management partner.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "No. 9 Ricardo Oguma Close, Opposite Osubi Airport",
        "addressRegion": "Delta State",
        "addressCountry": "NG"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+2347040621103",
        "contactType": "customer service",
        "email": "info@kampulse.com"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kampulse Recruitment Portal",
      "url": "https://kampulseai.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kampulseai.com/jobs?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
